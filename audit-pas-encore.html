    }

      display: flex;

    }

    .logo img {
      height: 45px;
      width: auto;
      display: block;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 2.5rem;
      align-items: center;
    }

    nav ul li {
      list-style: none;
    }

      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
