<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact – Assist by Alicia</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=League+Spartan:wght@700;900&family=Satisfy&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --blue: #1E2A4A;
      --coral: #FF4757;
      --yellow: #CAFF00;
      --black: #121212;
      --white: #FFFFFF;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(255,71,87,0.08), transparent 30%),
        radial-gradient(circle at top right, rgba(202,255,0,0.06), transparent 25%),
        repeating-linear-gradient(0deg, rgba(202,255,0,0.03) 0px, rgba(202,255,0,0.03) 1px, transparent 1px, transparent 60px),
        repeating-linear-gradient(90deg, rgba(202,255,0,0.03) 0px, rgba(202,255,0,0.03) 1px, transparent 1px, transparent 60px),
        var(--black);
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      line-height: 1.7;
      min-height: 100vh;
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      background: rgba(18,18,18,0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(202,255,0,0.12);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 4rem;
    }

    .logo {
      text-decoration: none;
      display: flex;
      align-items: center;
      position: relative;
      z-index: 1002;
    }

    .logo img {
      height: 75px;
      width: auto;
      display: block;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 2.5rem;
      align-items: center;
    }

    .nav-links li {
      list-style: none;
      position: relative;
    }

    .nav-links a,
    .menu-label {
      color: var(--white);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .menu-label {
      cursor: default;
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
    }

    .dropdown-arrow {
      font-size: 0.7rem;
      line-height: 1;
      transform: translateY(-1px);
      transition: transform 0.2s ease;
    }

    .dropdown:hover .dropdown-arrow {
      transform: translateY(-1px) rotate(180deg);
    }

    .nav-links a:hover,
    .nav-links a.active,
    .dropdown:hover .menu-label {
      color: var(--yellow);
    }

    .submenu {
      list-style: none;
      position: absolute;
      top: 100%;
      left: 0;
      min-width: 240px;
      display: none;
      flex-direction: column;
      gap: 0;
      background: rgba(18,18,18,0.98);
      border: 1px solid rgba(202,255,0,0.12);
      border-radius: 10px;
      padding: 0.5rem 0;
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
    }

    .submenu li {
      width: 100%;
    }

    .submenu a {
      display: block;
      padding: 0.85rem 1rem;
      font-size: 0.78rem;
      white-space: nowrap;
    }

    .dropdown:hover .submenu {
      display: flex;
    }

    .menu-toggle {
      display: none;
      background: transparent;
      border: 1px solid rgba(202,255,0,0.18);
      color: var(--white);
      width: 48px;
      height: 48px;
      border-radius: 8px;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      z-index: 1002;
    }

    .menu-toggle span,
    .menu-toggle span::before,
    .menu-toggle span::after {
      display: block;
      width: 20px;
      height: 2px;
      background: var(--white);
      position: relative;
      transition: transform 0.25s ease, opacity 0.25s ease;
      content: "";
    }

    .menu-toggle span::before {
      position: absolute;
      top: -6px;
    }

    .menu-toggle span::after {
      position: absolute;
      top: 6px;
    }

    .menu-toggle.active span {
      background: transparent;
    }

    .menu-toggle.active span::before {
      transform: translateY(6px) rotate(45deg);
    }

    .menu-toggle.active span::after {
      transform: translateY(-6px) rotate(-45deg);
    }

    .mobile-menu {
      display: none;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 9rem 2rem 6rem;
    }

    .hero {
      text-align: center;
      margin-bottom: 4rem;
    }

      color: var(--coral);
      font-size:
