<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audit de temps – Assist by Alicia</title>
  <meta
    name="description"
    content="Télécharge gratuitement ton audit de temps et gagne en clarté sur ton organisation."
  />

  <!-- Polices cohérentes avec ton univers -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;600;700;800&family=Montserrat:wght@400;500;600;700&family=Satisfy&display=swap" rel="stylesheet">

  <style type="text/css">
    @import url("https://assets.mlcdn.com/fonts.css?version=1775464");
  </style>

  <style>
    :root {
      --bg: #121212;
      --bg-soft: #1b1b1b;
      --navy: #1E2A4A;
      --coral: #FF4757;
      --lime: #CAFF00;
      --white: #FFFFFF;
      --text-soft: rgba(255,255,255,0.82);
      --text-muted: rgba(255,255,255,0.65);
      --border: rgba(255,255,255,0.12);
      --shadow: 0 24px 60px rgba(0,0,0,0.35);
      --radius-xl: 28px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(255,71,87,0.12), transparent 28%),
        radial-gradient(circle at bottom right, rgba(202,255,0,0.08), transparent 25%),
        linear-gradient(135deg, #121212 0%, #171b24 45%, #121212 100%);
      color: var(--white);
      font-family: "Montserrat", Arial, sans-serif;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    .container {
      width: 100%;
      max-width: 1180px;
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      gap: 42px;
      align-items: center;
    }

    .content {
      max-width: 640px;
    }

    .tag {
      display: inline-block;
      margin-bottom: 12px;
      color: var(--lime);
      font-family: "Satisfy", cursive;
      font-size: 1.4rem;
      line-height: 1;
    }

    h1 {
      margin: 0 0 18px;
      font-family: "League Spartan", Arial, sans-serif;
      font-size: clamp(3rem, 7vw, 5.6rem);
      line-height: 0.95;
      letter-spacing: -0.03em;
      text-transform: uppercase;
    }

    .highlight {
      color: var(--coral);
    }

    .subtitle {
      margin: 0 0 26px;
      color: var(--text-soft);
      font-size: 1.08rem;
      line-height: 1.8;
      max-width: 58ch;
    }

    .benefits {
      display: grid;
      gap: 14px;
      padding: 0;
      margin: 0 0 28px;
      list-style: none;
    }

    .benefits li {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      padding: 16px 18px;
      border-radius: var(--radius-lg);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      backdrop-filter: blur(6px);
    }

    .benefits .icon {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--coral);
      color: var(--white);
      font-family: "League Spartan", sans-serif;
      font-weight: 800;
      font-size: 0.95rem;
    }

    .benefits strong {
      display: block;
      margin-bottom: 3px;
      color: var(--white);
      font-weight: 700;
      font-size: 0.98rem;
    }

    .benefits span:last-child {
      color: var(--text-muted);
      line-height: 1.65;
      font-size: 0.95rem;
    }

    .proof {
      color: var(--text-muted);
      line-height: 1.7;
      font-size: 0.95rem;
      max-width: 56ch;
    }

    .card {
      position: relative;
      background: linear-gradient(180deg, rgba(30,42,74,0.94) 0%, rgba(18,18,18,0.98) 100%);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 30px;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top right, rgba(255,71,87,0.16), transparent 30%),
        radial-gradient(circle at bottom left, rgba(202,255,0,0.08), transparent 32%);
      pointer-events: none;
    }

    .card > * {
      position: relative;
      z-index: 1;
    }

    .card-tag {
      display: inline-block;
      margin-bottom: 10px;
      color: var(--lime);
      font-family: "Satisfy", cursive;
      font-size: 1.25rem;
    }

    .card h2 {
      margin: 0 0 10px;
      font-family: "League Spartan", sans-serif;
      font-size: 2.2rem;
      line-height: 1;
      text-transform: uppercase;
    }

    .card p {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.7;
      font-size: 0.98rem;
    }

    .mini-note,
    .trust-note {
      color: var(--text-muted);
      font-size: 0.85rem;
      line-height: 1.6;
      margin-top: 14px;
      text-align: center;
    }

    .trust-note {
      margin-top: 10px;
    }

    .divider {
      width: 78px;
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--coral), var(--lime));
      margin: 18px 0 20px;
    }

    @media (max-width: 920px) {
      .container {
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .page {
        padding: 26px 16px 40px;
      }

      h1 {
        font-size: clamp(2.7rem, 13vw, 4.4rem);
      }

      .card {
        padding: 22px 18px;
      }
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      border: 0;
    }

      border-color: #fff #fff #fff transparent;
      animation: ml-form-embedSubmitLoad 1.2s linear infinite;

    #mlb2-39707517 .ml-form-fieldRow input:focus {

    #mlb2-39707517 .ml-form-checkboxRow input[type="checkbox"] {
