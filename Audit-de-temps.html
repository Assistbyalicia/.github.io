<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audit de temps – Assist by Alicia</title>
  <meta name="description" content="Télécharge gratuitement ton audit de temps et gagne en clarté sur ton organisation.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;600;700;800&family=Montserrat:wght@400;500;600;700&family=Satisfy&display=swap" rel="stylesheet">

  <style>
    @import url("https://assets.mlcdn.com/fonts.css?version=1775464");

    :root {
      --bg: #121212;
      --navy: #1E2A4A;
      --coral: #FF4757;
      --lime: #CAFF00;
      --white: #FFFFFF;
      --text-soft: rgba(255,255,255,0.82);
      --text-muted: rgba(255,255,255,0.65);
      --border: rgba(255,255,255,0.12);
      --shadow: 0 24px 60px rgba(0,0,0,0.35);
      --radius-xl: 28px;
      --radius-lg: 18px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(255,71,87,0.12), transparent 28%),
        radial-gradient(circle at bottom right, rgba(202,255,0,0.08), transparent 25%),
        linear-gradient(135deg, #121212 0%, #171b24 45%, #121212 100%);
      color: var(--white);
      font-family: "Montserrat", Arial, sans-serif;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 4rem;
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(18, 18, 18, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .logo {
      text-decoration: none;
      display: flex;
      align-items: center;
    }

    .logo img {
      height: 45px;
      width: auto;
      display: block;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 2rem;
      margin: 0;
      padding: 0;
      align-items: center;
    }

    nav ul li {
      list-style: none;
    }

    nav ul a {
      color: #FFFFFF;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s ease;
    }

    nav ul a:hover,
    nav ul a.active {
      color: var(--lime);
    }

    .page {
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
      padding: 56px 20px 72px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      gap: 42px;
      align-items: center;
    }

    .content {
      max-width: 640px;
    }

    .tag {
      display: inline-block;
      margin-bottom: 12px;
      color: var(--lime);
      font-family: "Satisfy", cursive;
      font-size: 1.4rem;
      line-height: 1;
    }

    h1 {
      margin: 0 0 18px;
      font-family: "League Spartan", Arial, sans-serif;
      font-size: clamp(3rem, 7vw, 5.6rem);
      line-height: 0.95;
      letter-spacing: -0.03em;
      text-transform: uppercase;
    }

    .highlight {
      color: var(--coral);
    }

    .subtitle {
      margin: 0 0 26px;
      color: var(--text-soft);
      font-size: 1.08rem;
      line-height: 1.8;
      max-width: 58ch;
    }

    .benefits {
      display: grid;
      gap: 14px;
      padding: 0;
      margin: 0 0 28px;
      list-style: none;
    }

    .benefits li {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      padding: 16px 18px;
      border-radius: var(--radius-lg);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      backdrop-filter: blur(6px);
    }

    .benefits .icon {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--coral);
      color: var(--white);
      font-family: "League Spartan", sans-serif;
      font-weight: 800;
      font-size: 0.95rem;
    }

    .benefits strong {
      display: block;
      margin-bottom: 3px;
      color: var(--white);
      font-weight: 700;
      font-size: 0.98rem;
    }

    .benefits .text {
      color: var(--text-muted);
      line-height: 1.65;
      font-size: 0.95rem;
    }

    .proof {
      color: var(--text-muted);
      line-height: 1.7;
      font-size: 0.95rem;
      max-width: 56ch;
    }

    .card {
      position: relative;
      background: linear-gradient(180deg, rgba(30,42,74,0.94) 0%, rgba(18,18,18,0.98) 100%);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 30px;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top right, rgba(255,71,87,0.16), transparent 30%),
        radial-gradient(circle at bottom left, rgba(202,255,0,0.08), transparent 32%);
      pointer-events: none;
    }

    .card > * {
      position: relative;
      z-index: 1;
    }

    .card-tag {
      display: inline-block;
      margin-bottom: 10px;
      color: var(--lime);
      font-family: "Satisfy", cursive;
      font-size: 1.25rem;
    }

    .card h2 {
      margin: 0 0 10px;
      font-family: "League Spartan", sans-serif;
      font-size: 2.2rem;
      line-height: 1;
      text-transform: uppercase;
    }

    .card p {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.7;
      font-size: 0.98rem;
    }

    .divider {
      width: 78px;
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--coral), var(--lime));
      margin: 18px 0 20px;
    }

    .ml-form-embedSubmitLoad {
      display: inline-block;
      width: 20px;
      height: 20px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      border: 0;
    }

    .ml-form-embedSubmitLoad:after {
      content: " ";
      display: block;
      width: 11px;
      height: 11px;
      margin: 1px;
      border-radius: 50%;
      border: 4px solid #fff;
      border-color: #fff #fff #fff transparent;
      animation: ml-form-embedSubmitLoad 1.2s linear infinite;
    }

    @keyframes ml-form-embedSubmitLoad {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    #mlb2-39707517 {
      width: 100%;
      margin: 0 auto;
    }

    #mlb2-39707517 .ml-form-embedWrapper {
      background: transparent;
      border: 0;
      padding: 0;
      width: 100%;
      max-width: 100%;
    }

    #mlb2-39707517 .ml-form-embedBody,
    #mlb2-39707517 .ml-form-successBody {
      padding: 0;
    }

    #mlb2-39707517 .ml-form-embedContent {
      display: none;
    }

    #mlb2-39707517 .ml-form-formContent,
    #mlb2-39707517 .ml-form-checkboxRow,
    #mlb2-39707517 .ml-form-embedSubmit {
      margin: 0 0 16px;
      width: 100%;
    }

    #mlb2-39707517 .ml-form-fieldRow {
      margin: 0 0 14px;
      width: 100%;
    }

    #mlb2-39707517 .ml-form-fieldRow input[type="email"],
    #mlb2-39707517 .ml-form-fieldRow input[type="text"] {
      width: 100% !important;
      padding: 15px 16px !important;
      border-radius: 14px !important;
      border: 1px solid rgba(255,255,255,0.14) !important;
      background: rgba(255,255,255,0.06) !important;
      color: #ffffff !important;
      font-family: "Montserrat", Arial, sans-serif !important;
      font-size: 15px !important;
      line-height: 1.4 !important;
      box-shadow: none !important;
      outline: none;
      backdrop-filter: blur(6px);
    }

    #mlb2-39707517 .ml-form-fieldRow input::placeholder {
      color: rgba(255,255,255,0.58);
    }

    #mlb2-39707517 .ml-form-fieldRow input:focus {
      border-color: var(--coral) !important;
      box-shadow: 0 0 0 4px rgba(255,71,87,0.14) !important;
    }

    #mlb2-39707517 .ml-form-checkboxRow label.checkbox {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.55;
      cursor: pointer;
    }

    #mlb2-39707517 .ml-form-checkboxRow input[type="checkbox"] {
      margin-top: 3px;
      width: 16px;
      height: 16px;
      accent-color: var(--lime);
      flex-shrink: 0;
    }

    #mlb2-39707517 .ml-form-checkboxRow .label-description p {
      margin: 0;
      color: var(--text-muted) !important;
      font-size: 13px !important;
      line-height: 1.55 !important;
    }

    #mlb2-39707517 .ml-form-embedSubmit button {
      width: 100% !important;
      padding: 16px 18px !important;
      border: none !important;
      border-radius: 14px !important;
      background: var(--coral) !important;
      color: var(--white) !important;
      font-family: "League Spartan", Arial, sans-serif !important;
      font-size: 1.1rem !important;
      font-weight: 700 !important;
      letter-spacing: 0.01em;
      text-transform: uppercase;
      box-shadow: 0 12px 30px rgba(255,71,87,0.22);
      transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }

    #mlb2-39707517 .ml-form-embedSubmit button:hover {
      background: #ff5d6b !important;
      transform: translateY(-1px);
      box-shadow: 0 16px 34px rgba(255,71,87,0.28);
    }

    #mlb2-39707517 .ml-form-embedSubmit button.loading {
      display: none;
    }

    #mlb2-39707517 .ml-form-successContent {
      padding: 18px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(202,255,0,0.18);
    }

    #mlb2-39707517 .ml-form-successContent h4 {
      margin: 0 0 8px;
      color: var(--lime);
      font-family: "League Spartan", sans-serif;
      font-size: 1.5rem;
      text-transform: uppercase;
    }

    #mlb2-39707517 .ml-form-successContent p {
      margin: 0;
      color: var(--text-soft);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      padding: 2rem 4rem;
      color: rgba(255,255,255,0.55);
      font-size: 0.8rem;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
